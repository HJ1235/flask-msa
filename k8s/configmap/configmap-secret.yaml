# =============================================
# ConfigMap: 공통 애플리케이션 설정
# =============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: flask-app-config
  namespace: flask-app
data:
  DB_HOST: "mysql-service.flask-app.svc.cluster.local"
  DB_NAME: "flask_auth_db"
  DB_USER: "flask_user"
  MAX_CONTENT_LENGTH: "104857600"   # 100MB
  FLASK_ENV: "production"
---
# =============================================
# Secret: DB 비밀번호 및 Flask Secret Key
# base64 인코딩 필요: echo -n 'value' | base64
# DB_PASSWORD: P@ssw0rd -> UEBzc3cwcmQ=
# FLASK_SECRET_KEY: your-secret-key-here (변경 필요)
# =============================================
apiVersion: v1
kind: Secret
metadata:
  name: flask-app-secret
  namespace: flask-app
type: Opaque
data:
  DB_PASSWORD: Rmxhc2tVc2VyITIwMjY=
  FLASK_SECRET_KEY: Zmxhc2stbXNhLXNlY3JldC1rZXktMjAyNg==
  MYSQL_ROOT_PASSWORD: Um9vdERCITIwMjY=
