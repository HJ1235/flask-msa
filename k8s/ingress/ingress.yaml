# =============================================
# Ingress: 경로 기반 라우팅으로 모든 마이크로서비스 연결
# nginx.ingress.kubernetes.io 어노테이션 사용
# =============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-app-ingress
  namespace: flask-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # admin 경로: IP 화이트리스트 적용 (관리자 IP로 변경)
    nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.0.0/24"
spec:
  tls:
    - hosts:
        - flask-app.example.com      # 실제 도메인으로 변경
      secretName: flask-app-tls
  rules:
    - host: flask-app.example.com    # 실제 도메인으로 변경
      http:
        paths:
          # auth-service: 루트 및 인증 관련 경로
          - path: /(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          # board-service
          - path: /board(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: board-service
                port:
                  number: 80
          # diary-service
          - path: /diary(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: diary-service
                port:
                  number: 80
          # todos-service
          - path: /todos(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: todos-service
                port:
                  number: 80
          # study-service
          - path: /study(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: study-service
                port:
                  number: 80
          # admin-service (IP 제한 별도 Ingress로 분리)
          - path: /admin(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 80
---
# =============================================
# admin 전용 Ingress (IP 화이트리스트 강화)
# =============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-admin-ingress
  namespace: flask-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /admin/$2
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.0.0/24,10.0.0.0/8"
spec:
  tls:
    - hosts:
        - admin.flask-app.example.com
      secretName: flask-app-tls
  rules:
    - host: admin.flask-app.example.com
      http:
        paths:
          - path: /(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 80
