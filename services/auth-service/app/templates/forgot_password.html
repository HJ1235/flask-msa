{% extends 'base.html' %}
{% block title %}비밀번호 찾기{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-4"><i class="bi bi-key me-2 text-warning"></i>비밀번호 찾기</h4>
                <form action="/forgot_password" method="POST">
                    <div class="mb-3">
                        <label class="form-label">사용자 이름</label>
                        <input type="text" name="username" class="form-control" placeholder="아이디 입력" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">휴대폰 번호</label>
                        <input type="text" name="phone_number" class="form-control" placeholder="예: 01012345678" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">계정 확인</button>
                    </div>
                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none small">로그인으로 돌아가기</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
