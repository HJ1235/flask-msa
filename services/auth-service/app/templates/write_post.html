{% extends 'base.html' %}
{% block title %}글쓰기{% endblock %}

{% block content %}
<div class="mb-4">
    <h2><i class="bi bi-pencil-square me-2 text-primary"></i>글쓰기</h2>
</div>
<div class="card shadow-sm">
    <div class="card-body p-4">
        <form action="/board/write" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">제목</label>
                <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">내용</label>
                <textarea name="content" class="form-control" rows="12" placeholder="내용을 입력하세요" required></textarea>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <a href="/board/" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>등록</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
