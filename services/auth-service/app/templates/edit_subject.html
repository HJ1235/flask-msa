{% extends 'base.html' %}
{% block title %}과목 수정{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="/admin/subjects" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>과목 목록</a>
</div>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4"><i class="bi bi-folder-symlink me-2 text-danger"></i>과목 수정</h4>
                <form action="/admin/edit_subject/{{ subject.id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">과목 이름</label>
                        <input type="text" name="name" class="form-control" value="{{ subject.name }}" required>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="/admin/subjects" class="btn btn-secondary">취소</a>
                        <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg me-1"></i>수정 완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
