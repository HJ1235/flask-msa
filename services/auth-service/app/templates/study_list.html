{% extends 'base.html' %}
{% block title %}학습 과목 목록{% endblock %}

{% block content %}
<div class="mb-4">
    <h2><i class="bi bi-book me-2" style="color:#6f42c1"></i>학습 콘텐츠</h2>
    <p class="text-muted">학습하고 싶은 과목을 선택하세요.</p>
</div>

<div class="row g-4">
    {% for subject in subjects %}
    <div class="col-md-4">
        <a href="/study/{{ subject.id }}" class="text-decoration-none">
            <div class="card shadow-sm h-100 border-0" style="border-left: 4px solid #6f42c1 !important;">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-folder2-open display-5" style="color:#6f42c1"></i>
                    <div>
                        <h5 class="card-title mb-1">{{ subject.name }}</h5>
                        <span class="text-muted small">콘텐츠 보기 →</span>
                    </div>
                </div>
            </div>
        </a>
    </div>
    {% else %}
    <div class="col-12 text-center text-muted py-5">
        <i class="bi bi-inbox display-4 d-block mb-3"></i>
        등록된 과목이 없습니다.
    </div>
    {% endfor %}
</div>
{% endblock %}
