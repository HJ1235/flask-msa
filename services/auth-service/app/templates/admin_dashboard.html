{% extends 'base.html' %}
{% block title %}관리자 대시보드{% endblock %}

{% block content %}
<div class="mb-4">
    <h2><i class="bi bi-gear-fill me-2 text-danger"></i>관리자 대시보드</h2>
    <p class="text-muted">콘텐츠와 과목을 관리합니다.</p>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <a href="/admin/subjects" class="text-decoration-none">
            <div class="card shadow-sm border-0 h-100" style="border-left:4px solid #dc3545!important">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-folder-plus display-5 text-danger"></i>
                    <div>
                        <h5 class="mb-1">과목 관리</h5>
                        <p class="text-muted small mb-0">과목 추가, 수정, 삭제</p>
                    </div>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="/admin/content" class="text-decoration-none">
            <div class="card shadow-sm border-0 h-100" style="border-left:4px solid #fd7e14!important">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-file-earmark-text display-5 text-warning"></i>
                    <div>
                        <h5 class="mb-1">콘텐츠 관리</h5>
                        <p class="text-muted small mb-0">콘텐츠 등록, 수정, 삭제</p>
                    </div>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="/admin/add_content" class="text-decoration-none">
            <div class="card shadow-sm border-0 h-100" style="border-left:4px solid #198754!important">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="bi bi-plus-circle display-5 text-success"></i>
                    <div>
                        <h5 class="mb-1">콘텐츠 등록</h5>
                        <p class="text-muted small mb-0">새 콘텐츠 추가</p>
                    </div>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
