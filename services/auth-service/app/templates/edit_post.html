{% extends 'base.html' %}
{% block title %}게시글 수정{% endblock %}

{% block content %}
<div class="mb-4">
    <h2><i class="bi bi-pencil me-2 text-primary"></i>게시글 수정</h2>
</div>
<div class="card shadow-sm">
    <div class="card-body p-4">
        <form action="/board/edit/{{ post.id }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">제목</label>
                <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">내용</label>
                <textarea name="content" class="form-control" rows="12" required>{{ post.content }}</textarea>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <a href="/board/view/{{ post.id }}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>수정 완료</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
