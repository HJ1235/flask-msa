{% extends 'base.html' %}
{% block title %}비밀번호 재설정{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-4"><i class="bi bi-shield-lock me-2 text-success"></i>새 비밀번호 설정</h4>
                <form action="/reset_password" method="POST">
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호</label>
                        <input type="password" name="new_password" class="form-control"
                               placeholder="영문대소문자+숫자+특수문자 8자 이상" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호 확인</label>
                        <input type="password" name="confirm_password" class="form-control"
                               placeholder="비밀번호 재입력" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">비밀번호 변경</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
