apiVersion: apps/v1
kind: Deployment
metadata:
  name: todos-service
  namespace: flask-app
  labels:
    app: todos-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todos-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: todos-service
        version: "1.0"
    spec:
      serviceAccountName: auth-service-sa
      containers:
        - name: todos-service
          image: docker.io/zurang/todos-service:9f228b2
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flask-app-secret
                  key: DB_PASSWORD
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flask-app-secret
                  key: FLASK_SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: todos-service
  namespace: flask-app
  labels:
    app: todos-service
spec:
  selector:
    app: todos-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
