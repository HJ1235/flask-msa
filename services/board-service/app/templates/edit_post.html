<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 수정</title>
</head>
<body>
  <h1>게시글 수정</h1>
  <form method="post">
    <input type="text" name="title" value="{{ post.title if post else '' }}">
    <textarea name="content">{{ post.content if post else '' }}</textarea>
    <button type="submit">수정</button>
  </form>
</body>
</html>
